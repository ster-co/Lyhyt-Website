<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <title>Deze website wordt gebouwd</title>
  <style>
    :root {
      --brand-yellow: #FED130;
      --brand-blue: #111E4C;
      --bg: #ffffff;
      --text: #111E4C;
      --logo-width: min(56vw, 520px);
      --cycle: 12s; /* 4 varianten x 3 seconden */
      --shadow: 0 12px 30px rgba(17, 30, 76, 0.10);
    }
 
    * {
      box-sizing: border-box;
    }
 
    html,
    body {
      height: 100%;
    }
 
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
 
    .build-screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 32px;
      text-align: center;
      background: #ffffff;
      overflow: hidden;
    }
 
    .brand-loader {
      position: relative;
      width: var(--logo-width);
      aspect-ratio: 405 / 285;
      filter: drop-shadow(var(--shadow));
    }
 
    .brand-variant {
      position: absolute;
      inset: 0;
      opacity: 0;
      animation: layerWindow var(--cycle) linear forwards;
      animation-delay: var(--start);
      will-change: opacity;
    }
 
    .brand-variant svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }
 
    .brand-path {
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      fill-opacity: 0;
      animation: drawPath var(--cycle) ease-in-out forwards;
      animation-delay: calc(var(--start) + var(--path-delay));
      will-change: stroke-dashoffset, fill-opacity, opacity;
    }
 
    .build-text {
      margin: 0;
      font-size: clamp(20px, 2vw, 30px);
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--text);
    }
 
    /* Varianten 1 t/m 3 verdwijnen weer */
    @keyframes layerWindow {
      0%, 33% {
        opacity: 1;
      }
      36%, 100% {
        opacity: 0;
      }
    }
 
    /* Laatste variant blijft permanent staan */
    .brand-variant.last {
      animation: lastLayerWindow var(--cycle) linear forwards;
    }
 
    @keyframes lastLayerWindow {
      0%, 33% {
        opacity: 1;
      }
      100% {
        opacity: 1;
      }
    }
 
    /* Paden tekenen, vullen en bij laatste variant zichtbaar blijven */
    @keyframes drawPath {
      0% {
        stroke-dashoffset: 100;
        fill-opacity: 0;
        opacity: 1;
      }
      58% {
        stroke-dashoffset: 0;
        fill-opacity: 0;
        opacity: 1;
      }
      66% {
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 1;
      }
      91% {
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 0;
      }
    }
 
    /* Laatste paden blijven permanent zichtbaar */
    .brand-variant.last .brand-path {
      animation: drawPathLast var(--cycle) ease-in-out forwards;
      animation-delay: calc(var(--start) + var(--path-delay));
    }
 
    @keyframes drawPathLast {
      0% {
        stroke-dashoffset: 100;
        fill-opacity: 0;
        opacity: 1;
      }
      58% {
        stroke-dashoffset: 0;
        fill-opacity: 0;
        opacity: 1;
      }
      66% {
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 1;
      }
    }
 
    @media (max-width: 768px) {
      :root {
        --logo-width: min(80vw, 360px);
      }
 
      .build-screen {
        gap: 24px;
      }
    }
 
    @media (prefers-reduced-motion: reduce) {
      .brand-variant {
        animation: none;
        opacity: 0;
      }
 
      .brand-variant.last {
        opacity: 1;
      }
 
      .brand-path {
        animation: none;
        stroke-dashoffset: 0;
        fill-opacity: 1;
        opacity: 1;
      }
    }
  </style>
</head>
